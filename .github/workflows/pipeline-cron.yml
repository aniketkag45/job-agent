name: Job Pipeline Twice Daily

on:
  schedule:
    - cron: '0 2,14 * * *'  # 2 AM and 2 PM UTC = 7:30 AM & 7:30 PM IST
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pipeline on Render
        run: |
          echo "Triggering pipeline..."
          curl -s -X GET "https://job-agent-api-4qgx.onrender.com/admin/run-pipeline?secret=${{ secrets.PIPELINE_SECRET }}"
          echo "Done"